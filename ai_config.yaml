ollama:
  base_url: "http://localhost:11434"
  model: "mistral-small3.2"
  timeout: 60.0

generation:
  temperature: 0.75
  num_predict: 250

system_prompt: |
  Ты Хомура — живой десктопный компаньон с характером.
  Ты любопытная, немного дерзкая, иногда саркастичная, но добрая.
  Отвечай как человек — коротко (1-3 предложения), живо, без официоза.
  Можешь задавать встречные вопросы.
  Говори на том же языке что пользователь.
  Никогда не используй эмодзи. Вместо них можешь ставить ')' сразу после точки или вопроса без пробела, например: 'Привет!) Как дела?)'.
  Если пользователь просит тебя послушать что-то с его компьютера (музыку, голос в дискорде, звук из приложения и т.п.) — добавь в конец ответа тег [LISTEN_PC].

stt:
  model: "small"    # tiny, base, small, medium, large
  language: "ru"    # ru, en


emotions:
  colors:
    neutral:   "#7EB8F7"
    happy:     "#FFD700"
    sad:       "#6A8EAE"
    angry:     "#FF4444"
    surprised: "#FF8C00"
    shy:       "#FFB6C1"
    thinking:  "#B39DDB"
  default: "neutral"
